<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Fund 🏦</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Kanit','Sarabun',sans-serif;background:#070b1a;color:#dde5ff;overflow-x:hidden}
@keyframes goldGlow{0%,100%{box-shadow:0 0 22px rgba(245,200,66,.45),0 0 55px rgba(245,200,66,.2)}50%{box-shadow:0 0 45px rgba(245,200,66,.9),0 0 110px rgba(245,200,66,.5)}}
@keyframes silverGlow{0%,100%{box-shadow:0 0 15px rgba(192,192,192,.3)}50%{box-shadow:0 0 30px rgba(192,192,192,.6),0 0 60px rgba(192,192,192,.3)}}
@keyframes bronzeGlow{0%,100%{box-shadow:0 0 12px rgba(205,127,50,.35)}50%{box-shadow:0 0 25px rgba(205,127,50,.65)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes particle{0%{transform:translate(0,0) scale(1);opacity:.9}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
@keyframes fadeUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(-18px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes rankPop{0%{transform:scale(0) rotate(-200deg);opacity:0}60%{transform:scale(1.35) rotate(12deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:.85}50%{opacity:.2}}
@keyframes crown{0%,100%{transform:translateY(0) rotate(-8deg) scale(1)}50%{transform:translateY(-7px) rotate(8deg) scale(1.15)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes confettiFall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes qrPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.5)}50%{box-shadow:0 0 0 14px rgba(0,212,255,0)}}
@keyframes balancePulse{0%,100%{text-shadow:0 0 18px rgba(0,220,100,.4)}50%{text-shadow:0 0 38px rgba(0,220,100,.9)}}
@keyframes numIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.glass{background:rgba(255,255,255,.045);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.09);border-radius:16px}
.card-ho{transition:transform .22s,box-shadow .22s;cursor:pointer}
.card-ho:hover{transform:translateY(-4px);box-shadow:0 14px 45px rgba(0,0,0,.5)}
.btn-p{background:linear-gradient(135deg,#00d4ff,#006fff);color:#fff;border:none;padding:12px 28px;border-radius:12px;font-family:'Kanit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,212,255,.45)}
.btn-d{background:linear-gradient(135deg,#ff4444,#cc0000);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-d:hover{box-shadow:0 5px 18px rgba(255,68,68,.45)}
.btn-s{background:linear-gradient(135deg,#00cc66,#009944);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-s:hover{box-shadow:0 5px 18px rgba(0,204,102,.45)}
.btn-g{background:rgba(255,255,255,.07);color:#dde5ff;border:1px solid rgba(255,255,255,.13);padding:9px 18px;border-radius:10px;font-family:'Kanit',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-g:hover{background:rgba(255,255,255,.12)}
input,select,textarea{background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:10px 14px;color:#dde5ff;font-family:'Kanit',sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,.18)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.28)}
select option{background:#0d1230}
.bv{background:rgba(0,220,100,.15);color:#00dc64;border:1px solid rgba(0,220,100,.32);padding:2px 11px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}
.bp{background:rgba(255,200,0,.15);color:#ffc800;border:1px solid rgba(255,200,0,.32);padding:2px 11px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}
.bu{background:rgba(255,80,80,.15);color:#ff5050;border:1px solid rgba(255,80,80,.32);padding:2px 11px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}
.tab{padding:9px 17px;border-radius:10px;cursor:pointer;transition:all .2s;font-size:13px;font-weight:500;color:rgba(255,255,255,.45);border:none;background:none;font-family:'Kanit',sans-serif;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.06)}
.tab.on{background:rgba(0,212,255,.16);color:#00d4ff;font-weight:600}
.r1{animation:goldGlow 2.5s ease-in-out infinite,float 3s ease-in-out infinite}
.r2{animation:silverGlow 3s ease-in-out infinite,float2 3.6s ease-in-out infinite}
.r3{animation:bronzeGlow 3.5s ease-in-out infinite,float3 4.2s ease-in-out infinite}
/* Outfit = clean modern numerals */
.num{font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.num-lg{font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.num-md{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.5px}
.num-sm{font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;letter-spacing:-.3px}
.num-rank{font-family:'Outfit',sans-serif;font-weight:900;letter-spacing:-1.5px;font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:2px}
</style>

function calcBoard(users,pays){
  return users.map(u=>{
    const ok=pays.filter(p=>p.uid===u.id&&p.status==='verified');
    const first=ok.length?Math.min(...ok.map(p=>p.paidAt)):Infinity;
    return{...u,cnt:ok.length,first,score:ok.length*1e13-first};
  }).sort((a,b)=>b.score-a.score);
}

// ── Supabase: Load all data ──
async function loadData(){
  const [uRes,eRes,pRes,cfgRes]=await Promise.all([
    db.from('users').select('*').order('id'),
    db.from('expenses').select('*').order('at'),
    db.from('payments').select('*').order('paid_at'),
    db.from('config').select('*'),
  ]);
  if(uRes.error||eRes.error) return false;

  // Seed on first run
  if(!uRes.data.length){
    await db.from('users').insert(SEED_USERS);
    STATE.users=SEED_USERS;
  } else { STATE.users=uRes.data; }

  if(!eRes.data.length){
    await db.from('expenses').insert(SEED_EXP.map(e=>{return{id:e.id,name:e.name,amount:e.amount,desc:e.desc,at:e.at}}));
    STATE.expenses=SEED_EXP;
  } else { STATE.expenses=eRes.data; }

  STATE.payments=(pRes.data||[]).map(p=>{return{...p,paidAt:p.paid_at}});

  const cfgs=cfgRes.data||[];
  const qrRow=cfgs.find(r=>r.key==='qr');
  const balRow=cfgs.find(r=>r.key==='savedBalance');
  if(qrRow?.value) STATE.qr=qrRow.value;
  if(balRow?.value) STATE.savedBalance=+balRow.value;
  return true;
}

// ── Supabase: Realtime ──
function subscribeRealtime(){
  db.channel('class_fund')
    .on('postgres_changes',{event:'*',schema:'public',table:'payments'},async ()=>{
      const{data}=await db.from('payments').select('*').order('paid_at');
      STATE.payments=(data||[]).map(p=>{return{...p,paidAt:p.paid_at}});
      render();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'expenses'},async ()=>{
      const{data}=await db.from('expenses').select('*').order('at');
      STATE.expenses=data||[];render();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'users'},async ()=>{
      const{data}=await db.from('users').select('*').order('id');
      STATE.users=data||[];render();
    })
    .subscribe();
}

function renderRoomChart(){
  const{expenses,payments,users,savedBalance}=STATE;
  const got=payments.filter(p=>p.status==='verified').reduce((s,p)=>{const e=expenses.find(x=>x.id===p.eid);return s+(e?.amount||0)},0);
  const target=users.length*expenses.reduce((s,e)=>s+e.amount,0)||1;
  const pct=Math.min(100,(got/target)*100);
  const grandTotal=savedBalance+got;
  const bars=expenses.map(e=>{
    const paid=payments.filter(p=>p.eid===e.id&&p.status==='verified').length;
    const pend=payments.filter(p=>p.eid===e.id&&p.status==='pending').length;
    const paidAmt=paid*e.amount;
    const pendAmt=pend*e.amount;
    const maxAmt=users.length*e.amount||1;
    const paidPct=Math.min(100,(paidAmt/maxAmt)*100);
    const pendPct=Math.min(100-paidPct,(pendAmt/maxAmt)*100);
    const shortName=e.name.replace(' 📚','').replace('เก็บเงิน','').trim();
    return{shortName,paidAmt,pendAmt,maxAmt,paidPct,pendPct,paid,pend,n:users.length,amount:e.amount};
  });
  const barsHtml=bars.map(b=>`
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
        <span style="font-size:11px;color:rgba(255,255,255,.55);font-weight:500">${b.shortName}</span>
        <span class="num" style="font-size:11px;color:#00dc64">${b.paid}/${b.n} คน · ${thb(b.paidAmt)}</span>
      </div>
      <div style="height:9px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;position:relative">
        <div style="position:absolute;left:0;top:0;height:100%;width:${b.paidPct.toFixed(1)}%;background:linear-gradient(90deg,#00b894,#00dc64);border-radius:5px"></div>
        <div style="position:absolute;left:${b.paidPct.toFixed(1)}%;top:0;height:100%;width:${b.pendPct.toFixed(1)}%;background:rgba(255,200,0,.5);border-radius:0 5px 5px 0"></div>
      </div>
      ${b.pend>0?`<div style="font-size:10px;color:rgba(255,200,0,.6);margin-top:3px">⏳ รอตรวจ ${b.pend} คน (${thb(b.pendAmt)})</div>`:''}
    </div>`).join('');
  return`<div class="glass" style="padding:20px">
    <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:16px;display:flex;align-items:center;gap:7px">
      <span style="font-size:17px">📊</span> สถานะการเงินห้อง
    </div>
    <div style="background:rgba(0,220,100,.07);border:1px solid rgba(0,220,100,.2);border-radius:12px;padding:16px;margin-bottom:14px;text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,.38);margin-bottom:5px">ยอดรวมในกระเป๋า</div>
      <div class="num" style="font-size:26px;font-weight:800;color:#00dc64;animation:balancePulse 2.5s ease-in-out infinite">${thb(grandTotal)}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:6px">
        <span style="font-size:10px;color:rgba(255,200,66,.6)">ปี 2568: ${thb(savedBalance)}</span>
        <span style="font-size:10px;color:rgba(0,220,100,.6)">+ เก็บได้: ${thb(got)}</span>
      </div>
    </div>
    ${expenses.length>0?`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:rgba(255,255,255,.4)">เป้าหมาย ปี 2569</span>
        <span class="num" style="font-size:11px;color:#00d4ff">${pct.toFixed(0)}% · ${thb(got)}/${thb(target)}</span>
      </div>
      <div style="height:11px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${pct.toFixed(1)}%;background:linear-gradient(90deg,#00d4ff,#a78bfa);border-radius:6px;transition:width 1s cubic-bezier(.34,1.56,.64,1)"></div>
      </div>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,.07);padding-top:14px">${barsHtml}</div>
    <div style="display:flex;gap:12px;margin-top:4px">
      <span style="font-size:10px;color:rgba(0,220,100,.65)">● ยืนยันแล้ว</span>

    const u=board[idx];if(!u)return`<div style="flex:1;max-width:${col===1?190:162}px"></div>`;
    const r=RING[idx];
    const particles=idx===0?Array.from({length:16},(_,i)=>{const a=(i/16)*2*Math.PI,d=48+Math.random()*18;return`<div style="position:absolute;width:5px;height:5px;border-radius:50%;background:hsl(${40+i*5},100%,60%);top:50%;left:50%;margin:-2px;--tx:${Math.cos(a)*d.toFixed(1)}px;--ty:${Math.sin(a)*d.toFixed(1)}px;animation:particle 2.4s ease-out ${((i/16)*2.4).toFixed(2)}s infinite"></div>`;}).join(''):'';
    return`<div style="flex:1;max-width:${col===1?190:162}px;animation:fadeUp .6s ease ${col*.12}s both">
      <div class="${r.cls}" style="background:${r.bg};border:1px solid ${r.border};border-radius:18px;padding:${col===1?'22px 14px':'14px 10px'};text-align:center;position:relative;overflow:hidden;min-height:${r.h}px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:${col===1?5:4}px">
        <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">${particles}</div>
        <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:${col===1?5:3}px">
          ${r.extra}
          <span style="font-size:${col===1?30:22}px">${MEDAL[idx]}</span>
          <span class="num-rank" style="font-size:${col===1?34:22}px;color:${r.col};animation:rankPop .65s cubic-bezier(.34,1.56,.64,1) ${(col*.12+.3).toFixed(2)}s both">#${idx+1}</span>
          <span style="font-weight:700;font-size:${col===1?14:11}px;color:${r.col};line-height:1.3;text-align:center">${u.name}</span>
          ${u.nick?`<span style="font-size:11px;color:${r.col};opacity:.7">(${u.nick})</span>`:''}
          <div><span class="num-rank" style="font-size:${col===1?22:16}px;color:#00dc64">${u.cnt}</span><span style="font-size:11px;color:rgba(255,255,255,.38)"> /${total}</span></div>
          ${u.cnt>0?`<span style="font-size:10px;color:rgba(255,255,255,.3)">ไวสุด ${shortDate(u.first)}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  const rest=board.length>3?board.slice(3).map((u,i)=>`<div class="glass" style="padding:13px 18px;display:flex;align-items:center;gap:14px;animation:slideIn .35s ease ${i*.05}s both">
    <div class="num-rank" style="font-size:16px;color:rgba(255,255,255,.28);width:32px;text-align:center">#${i+4}</div>
    <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px">${u.name[1]||u.name[0]}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.name} ${u.nick?`<span style="color:rgba(255,255,255,.38);font-size:12px">(${u.nick})</span>`:''}</div>
    <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:2px;font-family:'Outfit',sans-serif">${u.cnt>0?`จ่ายแล้ว ${u.cnt}/${total} · ไวสุด ${shortDate(u.first)}`:'ยังไม่ได้จ่าย'}</div></div>
    <div class="num-rank" style="font-size:20px;color:${u.cnt>0?'#00dc64':'rgba(255,255,255,.22)'}">${u.cnt}</div>
  </div>`).join(''):'';
  const confetti=Array.from({length:28},(_,i)=>{const x=Math.random()*100,hue=Math.random()*360,sz=5+Math.random()*6,dur=3+Math.random()*3,dl=Math.random()*2;return`<div style="position:fixed;left:${x.toFixed(1)}%;top:-30px;width:${sz.toFixed(0)}px;height:${sz.toFixed(0)}px;border-radius:${Math.random()>.5?'50%':'2px'};background:hsl(${hue.toFixed(0)},90%,65%);animation:confettiFall ${dur.toFixed(1)}s ease ${dl.toFixed(1)}s both;pointer-events:none;z-index:5"></div>`;}).join('');
  return`${confetti}<div style="min-height:100vh;position:relative;z-index:1">
    <div style="padding:13px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10">
      <button class="btn-g" onclick="setState({view:'${from}'})" style="padding:7px 12px;font-size:12px">← กลับ</button>
      <div>
        <h1 style="font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,#f5c842,#ff9500,#f5c842);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;animation:shimmer 3s linear infinite">🏆 LEADERBOARD</h1>
        <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:1px">จัดตามความเร็วและจำนวนที่จ่าย (${users.length} คน)</div>
      </div>
    </div>
    <div style="padding:32px 16px 40px;max-width:720px;margin:0 auto">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:36px">${podium}</div>
      ${rest?`<div style="font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:12px;letter-spacing:1px">— อันดับที่เหลือ —</div><div style="display:flex;flex-direction:column;gap:8px">${rest}</div>`:''}
    </div>
  </div>`;
}


// ── ACTIONS ──
async function addExp(){
  const name=document.getElementById('ex-name')?.value?.trim();
  const amt=+document.getElementById('ex-amt')?.value;
  const desc=document.getElementById('ex-desc')?.value?.trim()||'';
  if(!name||!amt)return;
  const e={id:'e'+Date.now(),name,amount:amt,desc,at:Date.now()};
  STATE.expenses=[...STATE.expenses,e];setState({});
  await db.from('expenses').insert({id:e.id,name:e.name,amount:e.amount,desc:e.desc,at:e.at});
}
async function delExp(id){
  STATE.expenses=STATE.expenses.filter(e=>e.id!==id);setState({});
  await db.from('expenses').delete().eq('id',id);
}
async function addUser(){
  const name=document.getElementById('mb-name')?.value?.trim();
  const nick=document.getElementById('mb-nick')?.value?.trim()||'';
  const pin=document.getElementById('mb-pin')?.value?.trim()||'';
  if(!name)return;
  const u={id:'u'+Date.now(),name,nick,pin};
  STATE.users=[...STATE.users,u];setState({});
  await db.from('users').insert(u);
}
async function saveEditUser(id){
  const name=document.getElementById('edit-name-'+id)?.value?.trim();
  const nick=document.getElementById('edit-nick-'+id)?.value?.trim()||'';
  const pin=document.getElementById('edit-pin-'+id)?.value?.trim()||'';
  if(!name)return;
  STATE.users=STATE.users.map(u=>u.id===id?{...u,name,nick,pin}:u);
  setState({editMbId:null});
  await db.from('users').update({name,nick,pin}).eq('id',id);
}
async function delUser(id){
  STATE.users=STATE.users.filter(u=>u.id!==id);
  STATE.payments=STATE.payments.filter(p=>p.uid!==id);
  setState({});
  await db.from('payments').delete().eq('uid',id);
  await db.from('users').delete().eq('id',id);
}
async function resetUserPay(id){
  STATE.payments=STATE.payments.filter(p=>p.uid!==id);
  setState({editMbId:null});
  await db.from('payments').delete().eq('uid',id);
  showToast('ล้างข้อมูลการจ่ายแล้ว ✅');
}
async function approvePayment(id){
  STATE.payments=STATE.payments.map(p=>p.id===id?{...p,status:'verified'}:p);
  setState({});
  await db.from('payments').update({status:'verified'}).eq('id',id);
  showToast('อนุมัติแล้ว ✅');
}
async function rejectPayment(id){
  STATE.payments=STATE.payments.filter(p=>p.id!==id);
  setState({});
  await db.from('payments').delete().eq('id',id);
  showToast('ปฏิเสธแล้ว');
}
function clearQR(){
  STATE.qr=null;setState({});
  db.from('config').upsert({key:'qr',value:''});
}
function uploadQR(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    STATE.qr=ev.target.result;setState({});
    await db.from('config').upsert({key:'qr',value:ev.target.result});
  };
  r.readAsDataURL(f);
}
function uploadSlip(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>setState({paySlip:ev.target.result});
  r.readAsDataURL(f);
}
async function submitPay(uid,eid){
  const slip=STATE.paySlip||null;
  const p={id:'p'+Date.now(),uid,eid,status:'pending',paidAt:Date.now(),slip};
  STATE.payments=[...STATE.payments,p];
  setState({userTab:'done',paySelId:null,paySlip:null});
  await db.from('payments').insert({id:p.id,uid:p.uid,eid:p.eid,status:'pending',paid_at:p.paidAt,slip:p.slip});
}
async function updateBal(){
  const v=+document.getElementById('bal-inp')?.value;
  if(isNaN(v)||v<0)return;
  STATE.savedBalance=v;setState({});
  await db.from('config').upsert({key:'savedBalance',value:String(v)});
  showToast('บันทึกยอดเงินแล้ว ✅');
}

function bindEvents(){
  document.querySelectorAll('[data-login="admin"]').forEach(el=>el.addEventListener('click',showAdminForm));
  document.querySelectorAll('[data-login="user"]').forEach(el=>el.addEventListener('click',showUserForm));
  const ap=document.getElementById('adm-pw');if(ap)ap.addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
  const up=document.getElementById('usr-pin');if(up)up.addEventListener('keydown',e=>{if(e.key==='Enter')doUserLogin();});
}

function renderToast(){
  if(!STATE.toast)return'';
  const colors={info:'rgba(0,212,255,.9)',success:'rgba(0,220,100,.9)',error:'rgba(255,80,80,.9)'};
  return`<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${colors[STATE.toast.type]||colors.info};color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;animation:fadeUp .3s ease both;box-shadow:0 6px 24px rgba(0,0,0,.35)">${STATE.toast.msg}</div>`;
}

function render(){
  const app=document.getElementById('app');
  if(STATE.loading){
    app.innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;position:relative;z-index:1">
      <div style="font-size:52px;animation:float 1.5s ease-in-out infinite">🏦</div>
      <div style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#00d4ff;letter-spacing:2px">CLASS FUND</div>
      <div style="display:flex;gap:6px">
        ${[0,1,2].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:#00d4ff;animation:pulse 1.2s ease-in-out ${i*.2}s infinite"></div>`).join('')}
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,.3)">กำลังโหลดข้อมูล...</div>
    </div>`;
    renderStars();return;
  }
  let html='';
  if(STATE.view==='login') html=renderLogin();
  else if(STATE.view==='admin') html=renderAdmin();
  else if(STATE.view==='user') html=renderUser();
  else if(STATE.view==='lb') html=renderLB();
  app.innerHTML=html+renderToast();
  bindEvents();renderStars();
}

initApp();
</script>
</body>
</html>
